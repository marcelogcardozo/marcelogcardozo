<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="180" r="280" fill="url(#glow)"/>
  <circle cx="250" cy="500" r="280" fill="url(#glow)"/>

  <g font-family="Inter, system-ui, sans-serif" fill="#ffffff">
    <text x="80" y="220" font-size="28" font-weight="500" fill="#94a3b8" letter-spacing="2">MARCELO CARDOZO</text>
    <text x="80" y="320" font-size="76" font-weight="800">Software Engineer</text>
    <text x="80" y="390" font-size="36" font-weight="400" fill="#cbd5e1">building data-intensive systems</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#e5e7eb">
    <rect x="80" y="470" width="120" height="44" rx="22" fill="rgba(37, 99, 235, 0.15)" stroke="#1e40af"/>
    <text x="140" y="498" text-anchor="middle">Python</text>

    <rect x="212" y="470" width="130" height="44" rx="22" fill="rgba(37, 99, 235, 0.15)" stroke="#1e40af"/>
    <text x="277" y="498" text-anchor="middle">Next.js</text>

    <rect x="354" y="470" width="160" height="44" rx="22" fill="rgba(37, 99, 235, 0.15)" stroke="#1e40af"/>
    <text x="434" y="498" text-anchor="middle">PostgreSQL</text>

    <rect x="526" y="470" width="100" height="44" rx="22" fill="rgba(37, 99, 235, 0.15)" stroke="#1e40af"/>
    <text x="576" y="498" text-anchor="middle">AWS</text>
  </g>

  <rect x="80" y="560" width="200" height="4" fill="url(#accent)" rx="2"/>
  <text x="80" y="595" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#64748b">marcelocardozo.dev</text>
</svg>
